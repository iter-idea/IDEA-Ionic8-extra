name: CI

on:
  pull_request:
  push:
    branches: [main, development]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      # libraries must be built in dependency order (siblings resolve from dist/ via tsconfig paths)
      - run: npm run build:all
